const META={"date": "2026-07-21", "total": 3435, "ab": 16, "rec": 574};
const RENDER_CAP=1500;
const TASK_ID='encar-lease-cheapest-weekly';
const LS=k=>{try{return JSON.parse(localStorage.getItem(k)||'null')}catch(e){return null}};
const SV=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}};
let overrides=LS('encar_overrides')||{}, blacklist=LS('encar_blacklist')||[], favorites=LS('encar_favorites')||[], excludes=LS('encar_exclude')||[];
// columns: 0id 1b 2car 3t 4buy 5ym 6km 7p 8n 9ic 10su 11mat 12eff 13acq 14cls 15ab 16pr
function calc(r){
  const o=overrides[r[0]]||{};
  const su=o.su!=null?o.su:r[10], mat=o.mat!=null?o.mat:r[11];
  const p=r[7],n=r[8],ic=r[9],buy=r[4],pr=r[16];
  const cash=p*n+ic-su+(buy?mat:0);
  const eff=n>0?Math.round(cash/n*10)/10:null;
  const acq=(buy&&pr)?Math.round((cash-pr)/n*10)/10:null;
  const ab=(eff!=null&&eff<0)||n<3||(buy&&pr&&cash<pr*0.5)?1:0;
  return {su,mat,eff,acq,ab};
}
const brands=[...new Set(DATA.map(r=>r[1]))].sort();
const selB=document.getElementById('fBrand');
brands.forEach(b=>{const o=document.createElement('option');o.textContent=b;selB.appendChild(o)});
const el=id=>document.getElementById(id);
const st={short:false,ab:true,fav:false};
function fmt(v){return v==null?'—':v.toLocaleString('ko-KR')}
function render(){
  const q=el('fSearch').value.trim().toLowerCase();
  const br=el('fBrand').value, ty=el('fType').value, mt=el('fMat').value, cl=el('fCls').value;
  const effMax=parseFloat(el('fEff').value); const restMax=el('fRest').value===''?Infinity:parseFloat(el('fRest').value);
  let list=[];
  for(const r of DATA){
    if(blacklist.includes(r[0])||excludes.includes(r[0]))continue;
    const c=calc(r);
    if(q&&!r[2].toLowerCase().includes(q))continue;
    if(br&&r[1]!==br)continue;
    if(ty&&r[3]!==ty)continue;
    if(mt==='ret'&&r[4]===1)continue; if(mt==='buy'&&r[4]===0)continue;
    if(cl==='1'&&r[14]!==1)continue;
    if(!isNaN(effMax)&&c.eff>effMax)continue;
    if(r[8]>restMax)continue;
    if(st.short&&r[8]<6)continue;
    if(st.ab&&c.ab===1)continue;
    if(st.fav&&!favorites.includes(r[0]))continue;
    list.push({r,c});
  }
  list.sort((a,b)=>a.c.eff-b.c.eff);
  const total=list.length; list=list.slice(0,RENDER_CAP);
  let rank=0; const tb=el('tb'); tb.innerHTML='';
  const frag=document.createDocumentFragment();
  for(const {r,c} of list){
    let cls='';
    if(!c.ab){rank++; if(rank===1)cls='top1';else if(rank===2)cls='top2';else if(rank===3)cls='top3';}
    const tr=document.createElement('tr');
    tr.className=[cls,r[4]?'fin':'',c.ab?'ab':''].filter(Boolean).join(' ');
    const fav=favorites.includes(r[0]);
    tr.innerHTML=`<td><button class="ib" data-a="fav" data-id="${r[0]}">${fav?'⭐':'☆'}</button></td>
<td>${c.ab?'—':rank}</td>
<td><a href="https://fem.encar.com/cars/detail/${r[0]}" target="_blank">${r[2]}</a></td>
<td>${r[3]}<span class="badge ${r[4]?'bf':'bo'}">${r[4]?'금융':'반납'}</span></td>
<td>${r[5]}</td><td>${fmt(r[6])}km</td><td>${fmt(r[7])}</td><td>${r[8]}개월</td><td>${fmt(r[9])}</td>
<td><input data-a="su" data-id="${r[0]}" value="${c.su}"></td>
<td><input data-a="mat" data-id="${r[0]}" value="${c.mat}"></td>
<td class="eff ${c.eff<=100?'pos':''}">${fmt(c.eff)}</td>
<td>${fmt(c.acq)}</td>
<td><button class="ib" data-a="ex" data-id="${r[0]}" title="임시제외">🚫</button></td>
<td><button class="ib" data-a="del" data-id="${r[0]}" title="영구삭제">🗑</button></td>`;
    frag.appendChild(tr);
  }
  tb.appendChild(frag);
  el('cnt').textContent=`표시 ${list.length.toLocaleString()}대`+(total>RENDER_CAP?` (상위 ${RENDER_CAP}만 렌더, 조건일치 ${total.toLocaleString()}대)`:'')+` / 전체 ${DATA.length.toLocaleString()}대`;
  el('exCnt').textContent=excludes.length;
}
document.body.addEventListener('click',e=>{
  const b=e.target.closest('[data-a]'); if(!b)return;
  const id=b.dataset.id, a=b.dataset.a;
  if(a==='fav'){favorites=favorites.includes(id)?favorites.filter(x=>x!==id):[...favorites,id];SV('encar_favorites',favorites);render();}
  if(a==='ex'){excludes.push(id);SV('encar_exclude',excludes);render();}
  if(a==='del'){if(confirm('이 매물을 영구 블랙리스트에 추가할까요?')){blacklist.push(id);SV('encar_blacklist',blacklist);render();}}
});
document.body.addEventListener('change',e=>{
  const i=e.target.closest('input[data-a]');if(!i)return;
  const id=i.dataset.id,a=i.dataset.a,v=parseFloat(i.value);
  if(isNaN(v))return;
  overrides[id]=overrides[id]||{};overrides[id][a==='su'?'su':'mat']=v;
  SV('encar_overrides',overrides);render();
});
['fSearch','fBrand','fType','fMat','fCls','fEff','fRest'].forEach(id=>el(id).addEventListener('input',render));
[['fShort','short'],['fAb','ab'],['fFav','fav']].forEach(([id,k])=>{el(id).addEventListener('click',()=>{st[k]=!st[k];el(id).classList.toggle('on',st[k]);render();})});
el('btnExcl').addEventListener('click',()=>{excludes=[];SV('encar_exclude',excludes);render();});
if(window.cowork&&window.cowork.runScheduledTask){
  const b=el('btnCollect');b.style.display='';
  b.addEventListener('click',()=>{b.textContent='⏳ 수집 요청됨…';window.cowork.runScheduledTask(TASK_ID);});
}
// history
const hb=document.getElementById('histBox');
HISTORY.forEach(h=>{
  const d=document.createElement('div');d.className='hd';
  d.innerHTML=`<b>${h.d}</b> — 총 ${h.total.toLocaleString()}대 · 비정상 ${h.ab} · 추천 ${h.rec}`;
  const body=document.createElement('div');body.className='hbody';
  body.innerHTML=(h.top||[]).map((t,i)=>`${i+1}. ${t[0]} [${t[1]}] 월료 ${t[2]} · 잔여 ${t[3]}개월 · 실유지비 ${t[4]}${t[5]!=null?' · 월취득 '+t[5]:''}`).join('<br>');
  d.addEventListener('click',()=>body.classList.toggle('open'));
  hb.appendChild(d);hb.appendChild(body);
});
render();
</script></body></html>
